services:

  # ── Backend Python (FastAPI) ──────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - agent_workspace:/tmp/agent_workspace
    networks:
      - arcco-net

  # ── Frontend (Nginx + React) ──────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-web:/var/www/certbot
    networks:
      - arcco-net

  # ── Certbot (SSL certificates) ────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-web:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email nitiani@gmail.com --agree-tos --no-eff-email -d app.arccoai.com --keep-until-expiring
    depends_on:
      - nginx
    networks:
      - arcco-net

volumes:
  agent_workspace:
  certbot-etc:
  certbot-var:
  certbot-web:

networks:
  arcco-net:
    driver: bridge
