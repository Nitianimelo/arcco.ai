worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    types {
        application/javascript mjs;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ── Compressao Gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    upstream backend {
        server backend:8000;
    }

    # ── SERVIDOR HTTP (temporario — ate Certbot gerar certificados) ──────────
    server {
        listen 80;
        server_name app.arccoai.com;

        # ── ACME challenge para Certbot ──────────────────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ── API — Agentes (chat, search, files, ocr) ────────────────────────
        location /api/agent/ {
            proxy_pass         http://backend/api/agent/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── API — Admin ──────────────────────────────────────────────────────
        location /api/admin/ {
            proxy_pass         http://backend/api/admin/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 60s;
        }

        # ── Health check ─────────────────────────────────────────────────────
        location /health {
            proxy_pass       http://backend/health;
            proxy_set_header Host $host;
        }

        # ── Frontend React (arquivos estaticos) ──────────────────────────────
        location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root    /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            root       /usr/share/nginx/html;
            index      index.html;
            try_files  $uri $uri/ /index.html;
        }
    }

