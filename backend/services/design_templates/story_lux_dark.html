<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #0a0a0a; color: #d4af37; padding: 1.5cqw; }
    .frame { height: 100%; border: 1px solid #d4af37; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4cqw; }
    .title { margin: .3em 0; font-family: Georgia, serif; font-size: 3cqw; }
    .body { color: #a3a3a3; text-transform: uppercase; letter-spacing: .18em; font-size: .9cqw; }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <div id="arcco-design-content" class="frame">
      <span class="cq-kicker">{{ slots.eyebrow }}</span>
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
      <p class="cq-body body" data-role="subheadline">{{ slots.cta }}</p>
    </div>
  </div>
</body>
</html>
