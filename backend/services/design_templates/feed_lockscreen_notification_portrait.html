<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { position: relative; overflow: hidden; padding: 3cqw 2cqw; }
    .hero { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .shade { position: absolute; inset: 0; background: rgba(0,0,0,.22); }
    .time { position: relative; z-index: 2; text-align: center; font-size: 6cqw; font-weight: 200; color: #fff; margin-bottom: 2cqw; }
    .notif { position: relative; z-index: 2; background: rgba(255,255,255,.82); backdrop-filter: blur(10px); padding: 1.4cqw; border-radius: 1.5cqw; display: flex; gap: 1cqw; align-items: center; }
    .icon { width: 3.2cqw; height: 3.2cqw; border-radius: .8cqw; background: #000; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <img class="hero" src="{{ hero_image_url }}" alt="{{ slots.headline }}" />
    <div class="shade"></div>
    <div class="time">{{ slots.time }}</div>
    <div id="arcco-design-content" class="notif">
      <div class="icon"></div>
      <div>
        <h1 class="cq-title" data-role="headline">{{ slots.headline }}</h1>
        <p class="cq-body" data-role="subheadline">{{ slots.subheadline }}</p>
      </div>
    </div>
  </div>
</body>
</html>
