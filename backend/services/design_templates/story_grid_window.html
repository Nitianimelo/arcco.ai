<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: .4cqw; background: #fff; border: .4cqw solid #fff; color: #333; }
    .cell { display: flex; align-items: center; justify-content: center; text-align: center; padding: 2cqw; background: #eee; font-weight: 700; }
    .img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <div class="cell img"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
    <div class="cell">{{ slots.card_1 }}</div>
    <div id="arcco-design-content" class="cell">{{ slots.card_2 }}</div>
    <div class="cell img"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
  </div>
</body>
</html>
