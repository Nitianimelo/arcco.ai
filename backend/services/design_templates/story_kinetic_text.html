<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{background:#111;color:#fff;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}.border{position:absolute;font-size:1.8cqw;color:transparent;-webkit-text-stroke:.06cqw rgba(255,255,255,.3);text-transform:uppercase;white-space:nowrap}.t{top:1cqw;left:1cqw}.b{bottom:1cqw;right:1cqw;transform:rotate(180deg)}.l{left:-14cqw;top:50%;transform:rotate(-90deg)}.r{right:-14cqw;top:50%;transform:rotate(90deg)}.center{width:16cqw;height:22cqw;overflow:hidden;z-index:2}.center img{width:100%;height:100%;object-fit:cover}
</style></head><body><div class="container-base format-ig-story"><div class="border t">{{ slots.headline }}</div><div class="border b">{{ slots.headline }}</div><div class="border l">{{ slots.headline }}</div><div class="border r">{{ slots.headline }}</div><div id="arcco-design-content" class="center"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div></div></body></html>
