<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #eae6df; color: #3a352f; }
    .shell { height: 100%; padding-top: 5cqw; display: flex; flex-direction: column; align-items: center; }
    .arch { width: 70%; height: 49%; border-radius: 15cqw 15cqw 0 0; border: .25cqw solid #d1c7b8; padding: .8cqw; overflow: hidden; background: #fff; }
    .arch img { width: 100%; height: 100%; object-fit: cover; border-radius: 14cqw 14cqw 0 0; }
    .copy { text-align: center; margin-top: 2.4cqw; padding: 0 2cqw; }
    .title { margin: .3em 0 0; font-family: Georgia, serif; font-size: 2.7cqw; font-style: italic; }
    .body { margin: .6em 0 0; text-transform: uppercase; letter-spacing: .18em; font-size: .9cqw; }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <div id="arcco-design-content" class="shell">
      <div class="arch"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
      <div class="copy">
        <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
        <p class="cq-body body" data-role="subheadline">{{ slots.eyebrow }}</p>
      </div>
    </div>
  </div>
</body>
</html>
