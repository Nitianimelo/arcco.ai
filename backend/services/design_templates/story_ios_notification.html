<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{position:relative;overflow:hidden}.hero{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.blur{position:absolute;inset:0;backdrop-filter:blur(16px);background:rgba(0,0,0,.18)}.notif{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:82%;background:rgba(255,255,255,.82);border-radius:1.6cqw;padding:1.4cqw;display:flex;gap:1cqw;align-items:center}.icon{width:3.2cqw;height:3.2cqw;border-radius:.8cqw;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
</style></head><body><div class="container-base format-ig-story"><img class="hero" src="{{ hero_image_url }}" alt="{{ slots.headline }}" /><div class="blur"></div><div id="arcco-design-content" class="notif"><div class="icon">py</div><div><h1 class="cq-title" data-role="headline">{{ slots.headline }}</h1><p class="cq-body" data-role="subheadline">{{ slots.subheadline }}</p></div></div></div></body></html>
