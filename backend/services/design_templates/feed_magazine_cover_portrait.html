<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{position:relative;color:#fff}.hero{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.title{position:absolute;top:2cqw;width:100%;text-align:center;font-family:Georgia,serif;font-size:6cqw;line-height:.8;margin:0;text-shadow:0 .5cqw 1.5cqw rgba(0,0,0,.3)}.footer{position:absolute;left:2cqw;right:2cqw;bottom:2cqw;display:flex;justify-content:space-between;font-size:.8cqw;text-transform:uppercase;letter-spacing:.2em;border-top:.1cqw solid #fff;padding-top:1cqw}
</style></head><body><div class="container-base format-ig-post-portrait"><img class="hero" src="{{ hero_image_url }}" alt="{{ slots.headline }}" /><h1 class="title" data-role="headline">{{ slots.headline }}</h1><div id="arcco-design-content" class="footer"><span>{{ slots.eyebrow }}</span><span>{{ slots.subheadline }}</span></div></div></body></html>
