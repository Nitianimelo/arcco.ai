<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #fff; display: flex; flex-direction: column; }
    .top img { width: 100%; height: 42%; object-fit: cover; display: block; clip-path: polygon(0 0,100% 0,100% 90%,95% 100%,90% 88%,85% 100%,80% 90%,75% 100%,70% 88%,65% 100%,60% 90%,55% 100%,50% 88%,45% 100%,40% 90%,35% 100%,30% 88%,25% 100%,20% 90%,15% 100%,10% 88%,5% 100%,0 90%); }
    .copy { padding: 2.4cqw; text-align: center; }
    .title { margin: 0 0 .5em; font-family: Georgia, serif; font-size: 2.3cqw; color: #111; }
    .body { margin: 0; color: #555; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div class="top"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
    <div id="arcco-design-content" class="copy">
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
      <p class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</p>
    </div>
  </div>
</body>
</html>
