<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { position: relative; overflow: hidden; }
    .hero { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .fade { position: absolute; left: 0; right: 0; bottom: 0; height: 70%; background: linear-gradient(transparent, #000); }
    .copy { position: absolute; left: 2.2cqw; right: 2.2cqw; bottom: 7%; z-index: 2; color: #fff; text-align: center; }
    .title { margin: 0; font-family: Georgia, serif; font-size: 5cqw; font-style: italic; font-weight: 400; line-height: 1; }
    .body { margin-top: .8em; color: rgba(255,255,255,.82); }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <img class="hero" src="{{ hero_image_url }}" alt="{{ slots.headline }}" />
    <div class="fade"></div>
    <div id="arcco-design-content" class="copy">
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
      <p class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</p>
    </div>
  </div>
</body>
</html>
