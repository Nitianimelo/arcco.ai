<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #e5e5f7; background-image: radial-gradient(#444cf7 .5px, transparent .5px); background-size: 10px 10px; position: relative; }
    .pic { position: absolute; width: 17cqw; height: 22cqw; background: #fff; padding: 1cqw 1cqw 4cqw; box-shadow: 0 1cqw 2cqw rgba(0,0,0,.15); }
    .pic img { width: 100%; height: 100%; object-fit: cover; }
    .p1 { transform: rotate(-10deg) translate(2cqw, 18cqw); z-index: 1; }
    .p2 { transform: rotate(5deg) translate(14cqw, 36cqw); z-index: 2; }
    .title { position: absolute; left: 50%; bottom: 8%; transform: translateX(-50%); margin: 0; font-family: Georgia, serif; font-size: 3.5cqw; color: #111; z-index: 3; }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <div class="pic p1"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
    <div class="pic p2"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
    <div id="arcco-design-content">
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
    </div>
  </div>
</body>
</html>
