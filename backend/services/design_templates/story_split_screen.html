<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { display: flex; flex-direction: column; background: #1a1a1a; color: #fff; }
    .top { height: 50%; overflow: hidden; }
    .top img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .bottom { height: 50%; padding: 3cqw; display: flex; flex-direction: column; justify-content: center; }
    .title { margin: .25em 0; color: #facc15; font-size: 2.6cqw; line-height: 1.08; }
    .body { margin: 0; color: #d4d4d8; }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <div class="top"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
    <div id="arcco-design-content" class="bottom">
      <span class="cq-kicker">{{ slots.eyebrow }}</span>
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
      <p class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</p>
    </div>
  </div>
</body>
</html>
