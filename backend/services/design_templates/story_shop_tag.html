<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{background:#fff7ed;color:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3cqw;text-align:center}.product{width:22cqw;height:22cqw;border-radius:2cqw;overflow:hidden;box-shadow:0 1.8cqw 3.5cqw rgba(0,0,0,.18);margin-bottom:2.4cqw}.product img{width:100%;height:100%;object-fit:cover}.price{font-size:4cqw;font-weight:900;margin:.15em 0}.btn{display:inline-block;margin-top:1.2cqw;padding:.8em 1.4em;border-radius:999px;background:#111;color:#fff;font-weight:800}
</style></head><body><div class="container-base format-ig-story"><div class="product"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div><span class="cq-kicker">{{ slots.eyebrow }}</span><h1 class="cq-title" data-role="headline">{{ slots.headline }}</h1><div class="price">{{ slots.price }}</div><div id="arcco-design-content" class="btn" data-role="cta">{{ slots.cta }}</div></div></body></html>
