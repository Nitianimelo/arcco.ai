<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2cqw; }
    .title { margin: 0; font-size: 6cqw; text-transform: uppercase; line-height: .88; background: linear-gradient(45deg, #ff007a, #7000ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 2cqw rgba(112,0,255,.4)); }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div id="arcco-design-content">
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
    </div>
  </div>
</body>
</html>
