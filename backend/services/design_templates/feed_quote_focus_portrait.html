<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #0b0b0d; }
    .container-base { background: #fff; color: #111827; }
    .quote-shell { height: 100%; padding: 3.4cqw; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .quote-mark { font-family: Georgia, serif; font-size: 8cqw; color: #fca5a5; line-height: .75; }
    .quote-text { margin: .25em 0 .5em; font-size: 2.1cqw; font-weight: 800; line-height: 1.28; max-width: 18ch; }
    .quote-author { letter-spacing: .18em; text-transform: uppercase; color: #6b7280; font-size: .9cqw; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div id="arcco-design-content" class="quote-shell">
      <div class="quote-mark">“</div>
      <p class="cq-title quote-text" data-role="headline">{{ slots.quote }}</p>
      <span class="quote-author">{{ slots.eyebrow }}</span>
    </div>
  </div>
</body>
</html>
