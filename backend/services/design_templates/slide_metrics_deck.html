<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #0b0b0d; }
    .slide { width: 100%; min-height: 100%; }
    .container-base { background: linear-gradient(135deg, #ffffff 0%, #eff6ff 100%); color: #0f172a; }
    .metric-panel { width: 100%; height: 100%; border-radius: 28px; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: clamp(46px, 6cqw, 112px); font-weight: 900; }
    .metric-kicker { color: #1d4ed8; text-transform: uppercase; letter-spacing: .18em; }
    .metric-title { color: #0f172a; }
    .metric-body { color: #334155; }
    .metric-note { color: #475569; font-size: .9cqw; }
    ul { margin: 0; padding-left: 1.2em; }
    li { margin: .35em 0; }
  </style>
</head>
<body>
  <section class="slide container-base format-slide-16-9">
    <div id="arcco-design-content" class="content-shell">
      <div class="content-copy">
        <span class="cq-kicker metric-kicker">{{ slide.kicker }}</span>
        <h1 class="cq-title metric-title" data-role="headline">{{ slide.heading }}</h1>
        <div class="cq-body metric-body">
          {{ slide.points_html }}
        </div>
        <div class="metric-note">{{ slide.note }}</div>
      </div>
      <div class="content-media">
        <div class="metric-panel">{{ slide.big_value }}</div>
      </div>
    </div>
  </section>
</body>
</html>
