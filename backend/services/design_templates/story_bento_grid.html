<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{background:#e2e8f0;padding:1.2cqw;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1.3fr 1fr 1fr;gap:1cqw}.box{background:#fff;border-radius:1.2cqw;padding:1.4cqw}.span2{grid-column:span 2}.img{overflow:hidden;padding:0}.img img{width:100%;height:100%;object-fit:cover}.title{margin:0;font-size:1.7cqw}.body{margin-top:.4em;color:#64748b;font-size:1cqw}
</style></head><body><div class="container-base format-ig-story"><div class="box span2 img"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div><div class="box"><h1 class="cq-title title" data-role="headline">{{ slots.card_1 }}</h1></div><div class="box" style="background:#3b82f6;color:#fff"><h2 class="title">{{ slots.card_2 }}</h2><p class="body" style="color:#dbeafe">{{ slots.eyebrow }}</p></div><div id="arcco-design-content" class="box span2"><h2 class="title">{{ slots.headline }}</h2><p class="body">{{ slots.subheadline }}</p></div></div></body></html>
