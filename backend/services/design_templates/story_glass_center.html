<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { position: relative; overflow: hidden; }
    .bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .story-shell { position: relative; z-index: 2; height: 100%; display: flex; align-items: center; justify-content: center; padding: 3cqw; }
    .card { width: 82%; padding: 3cqw; border-radius: 2cqw; background: rgba(255,255,255,.16); backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,.32); color: #fff; text-align: center; box-shadow: 0 1.5cqw 4cqw rgba(0,0,0,.15); }
    .title { margin: .25em 0; font-size: 3.1cqw; line-height: 1.02; }
    .body { margin: 0; color: rgba(255,255,255,.82); }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <img class="bg-image" src="{{ hero_image_url }}" alt="{{ slots.headline }}" />
    <div id="arcco-design-content" class="story-shell">
      <div class="card">
        <span class="cq-kicker">{{ slots.eyebrow }}</span>
        <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
        <p class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</p>
      </div>
    </div>
  </div>
</body>
</html>
