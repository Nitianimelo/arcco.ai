<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #000; color: #fff; font-family: "VT323", monospace; }
    .shell { height: 100%; padding: 2.2cqw; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .title { margin: 0; font-size: 5cqw; color: #facc15; line-height: .88; text-shadow: .35cqw .35cqw 0 #ef4444; }
    .start { margin-top: 3cqw; font-size: 2cqw; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div id="arcco-design-content" class="shell">
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
      <div class="start" data-role="cta">{{ slots.cta }}</div>
    </div>
  </div>
</body>
</html>
