<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #111; color: #fff; padding: 2.2cqw; display: flex; flex-direction: column; justify-content: center; }
    .img { width: 100%; height: 28%; object-fit: cover; filter: grayscale(100%) contrast(150%); mix-blend-mode: hard-light; }
    .title { margin: -1.6cqw 0 0; font-family: "Space Grotesk", sans-serif; font-size: 6cqw; color: #0ff; text-transform: uppercase; text-shadow: -.3cqw 0 #f0f; }
    .bar { width: 100%; height: 3cqw; margin-top: 2cqw; opacity: .5; background: repeating-linear-gradient(90deg, #fff, #fff .2cqw, #000 .2cqw, #000 .5cqw, #fff .5cqw, #fff .8cqw, #000 .8cqw, #000 1.2cqw); }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <img class="img" src="{{ hero_image_url }}" alt="{{ slots.headline }}" />
    <div id="arcco-design-content">
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
      <p class="cq-body" data-role="subheadline">{{ slots.eyebrow }}</p>
      <div class="bar"></div>
    </div>
  </div>
</body>
</html>
