<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #0b0b0d; }
    .container-base { background: #111; color: #fff; }
    .testimonial-shell { height: 100%; padding: 3.2cqw; display: flex; flex-direction: column; justify-content: center; }
    .stars { color: #fbbf24; letter-spacing: .2em; font-size: 1.7cqw; margin-bottom: .9cqw; }
    .testimonial-copy { margin: 0 0 2.2cqw; font-size: 1.8cqw; line-height: 1.45; font-style: italic; }
    .person { display: flex; align-items: center; gap: 1cqw; }
    .avatar { width: 3.8cqw; height: 3.8cqw; border-radius: 999px; overflow: hidden; background: #1f2937; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .name { margin: 0; font-weight: 800; }
    .role { margin: .25em 0 0; color: #9ca3af; font-size: .95cqw; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div id="arcco-design-content" class="testimonial-shell">
      <div class="stars">★★★★★</div>
      <p class="testimonial-copy">{{ slots.testimonial_quote }}</p>
      <div class="person">
        <div class="avatar"><img src="{{ hero_image_url }}" alt="{{ slots.author_name }}" /></div>
        <div>
          <p class="name">{{ slots.author_name }}</p>
          <p class="role">{{ slots.author_role }}</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
