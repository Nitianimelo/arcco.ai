<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #ef4444; display: flex; flex-direction: column; gap: 2cqw; align-items: center; justify-content: center; padding: 2.2cqw; }
    .btn { width: 82%; padding: 2.2cqw; border-radius: 1.2cqw; text-align: center; font-family: Anton, sans-serif; font-size: 2.2cqw; text-transform: uppercase; box-shadow: 0 1.1cqw 0 rgba(0,0,0,.32); }
    .btn.one { background: #fff; color: #ef4444; transform: rotate(-2deg); }
    .btn.two { background: #3b82f6; color: #fff; transform: rotate(2deg); box-shadow: 0 1.1cqw 0 #1e3a8a; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div id="arcco-design-content" class="btn one">{{ slots.option_a }}</div>
    <div class="btn two">{{ slots.option_b }}</div>
  </div>
</body>
</html>
