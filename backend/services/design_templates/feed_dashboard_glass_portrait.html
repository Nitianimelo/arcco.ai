<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { position: relative; overflow: hidden; }
    .hero-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .shell { position: relative; z-index: 2; height: 100%; padding: 2.2cqw; display: flex; align-items: center; justify-content: center; }
    .card { width: 100%; height: 100%; padding: 2cqw; box-sizing: border-box; border-radius: 2cqw; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.3); backdrop-filter: blur(20px); color: #fff; display: flex; flex-direction: column; }
    .metric { margin: .25em 0 0; font-size: 4cqw; font-weight: 900; }
    .body { color: rgba(255,255,255,.82); }
    .bar { height: .7cqw; margin-top: auto; border-radius: 999px; background: rgba(255,255,255,.18); overflow: hidden; }
    .fill { width: 75%; height: 100%; background: #00ffcc; box-shadow: 0 0 1.2cqw #00ffcc; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <img class="hero-image" src="{{ hero_image_url }}" alt="{{ slots.headline }}" />
    <div id="arcco-design-content" class="shell">
      <div class="card">
        <span class="cq-kicker">{{ slots.eyebrow }}</span>
        <h1 class="cq-title metric" data-role="headline">{{ slots.big_value }}</h1>
        <p class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</p>
        <div class="bar"><div class="fill"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
