<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{background:#000;position:relative;color:#fff}.hero{width:100%;height:40%;object-fit:cover;filter:brightness(.6);position:absolute;top:0}.copy{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:100%;padding:0 2cqw;box-sizing:border-box}.title{margin:0;font-family:Georgia,serif;font-size:3cqw;text-transform:uppercase;letter-spacing:.3em}.body{margin-top:1em;font-size:.9cqw;letter-spacing:.4em;color:#aaa;text-transform:uppercase}
</style></head><body><div class="container-base format-ig-story"><img class="hero" src="{{ hero_image_url }}" alt="{{ slots.headline }}" /><div id="arcco-design-content" class="copy"><h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1><div class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</div></div></div></body></html>
