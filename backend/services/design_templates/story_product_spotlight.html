<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #f8f9fa; color: #111; }
    .shell { height: 100%; padding: 3cqw; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .image-ring { width: 23cqw; height: 23cqw; border-radius: 999px; overflow: hidden; box-shadow: 0 3cqw 4cqw -1.2cqw rgba(0,0,0,.28); margin-bottom: 3cqw; background: #fff; }
    .image-ring img { width: 100%; height: 100%; object-fit: cover; }
    .title { margin: .15em 0; font-size: 2.8cqw; }
    .body { margin: 0; color: #666; max-width: 18ch; }
    .cta { margin-top: 1.4cqw; letter-spacing: .2em; text-transform: uppercase; font-size: .85cqw; color: #555; }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <div id="arcco-design-content" class="shell">
      <div class="image-ring"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
      <span class="cq-kicker">{{ slots.eyebrow }}</span>
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
      <p class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</p>
      <div class="cta" data-role="cta">{{ slots.cta }}</div>
    </div>
  </div>
</body>
</html>
