<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #f4f1eb; color: #111; }
    .story-shell { height: 100%; padding: 4cqw; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
    .quote-mark { position: absolute; top: 8%; left: 8%; font-family: Georgia, serif; font-size: 24cqw; color: rgba(0,0,0,.06); line-height: 1; }
    .story-quote { margin: 0; font-family: "Playfair Display", Georgia, serif; font-size: 2.6cqw; line-height: 1.3; max-width: 14ch; z-index: 1; }
    .story-author { margin-top: 2cqw; text-transform: uppercase; letter-spacing: .2em; font-size: .95cqw; color: #5b524a; }
  </style>
</head>
<body>
  <div class="container-base format-ig-story">
    <div id="arcco-design-content" class="story-shell">
      <div class="quote-mark">“</div>
      <p class="cq-title story-quote" data-role="headline">{{ slots.quote }}</p>
      <span class="story-author">{{ slots.author }}</span>
    </div>
  </div>
</body>
</html>
