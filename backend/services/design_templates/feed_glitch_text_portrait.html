<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{background:#000;color:#fff;display:flex;align-items:center;justify-content:center}.title{font-family:"Space Grotesk",sans-serif;font-size:5cqw;text-transform:uppercase;position:relative}.title:before,.title:after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}.title:before{left:.3cqw;text-shadow:-.2cqw 0 red;clip-path:inset(10% 0 30% 0)}.title:after{left:-.3cqw;text-shadow:-.2cqw 0 cyan;clip-path:inset(40% 0 10% 0)}
</style></head><body><div class="container-base format-ig-post-portrait"><div id="arcco-design-content"><h1 class="cq-title title" data-role="headline" data-text="{{ slots.headline }}">{{ slots.headline }}</h1></div></div></body></html>
