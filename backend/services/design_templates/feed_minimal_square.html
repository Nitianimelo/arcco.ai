<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #0b0b0d; }
    .container-base { background: linear-gradient(135deg, #fffaf1 0%, #f4e6c8 45%, #d9b99b 100%); }
    .feed-card { width: 100%; height: 100%; border-radius: 28px; overflow: hidden; background: rgba(255,255,255,.52); box-shadow: 0 24px 60px rgba(66,42,25,.18); }
    .feed-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .feed-kicker { letter-spacing: .18em; text-transform: uppercase; color: #7c5c3b; font-weight: 700; }
    .feed-title { color: #3b2f25; }
    .feed-body { color: #5b4d42; }
    .feed-chip { background: #7c5c3b; color: #fff; border-radius: 999px; padding: .9em 1.35em; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-square">
    <div id="arcco-design-content" class="content-shell">
      <div class="content-copy">
        <span class="cq-kicker feed-kicker">{{ slots.eyebrow }}</span>
        <h1 class="cq-title feed-title" data-role="headline">{{ slots.headline }}</h1>
        <p class="cq-body feed-body" data-role="subheadline">{{ slots.subheadline }}</p>
        <div class="content-actions"><span class="feed-chip">{{ slots.cta }}</span></div>
      </div>
      <div class="content-media">
        <div class="feed-card"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
      </div>
    </div>
  </div>
</body>
</html>
