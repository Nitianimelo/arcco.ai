<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #dee1e6; color: #202124; display: flex; flex-direction: column; }
    .tabs { display: flex; gap: .5cqw; padding: 1cqw 1cqw 0; }
    .tab { flex: 1; padding: .9cqw 1cqw; border-radius: .8cqw .8cqw 0 0; background: #f1f3f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: .82cqw; color: #5f6368; }
    .tab.active { background: #fff; color: #202124; font-weight: 700; }
    .content { background: #fff; flex: 1; padding: 2.2cqw; }
    .body { color: #666; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div class="tabs">
      <div class="tab">{{ slots.tab_1 }}</div>
      <div class="tab active">{{ slots.tab_2 }}</div>
      <div class="tab">{{ slots.tab_3 }}</div>
    </div>
    <div id="arcco-design-content" class="content">
      <h1 class="cq-title" data-role="headline">{{ slots.headline }}</h1>
      <p class="cq-body body" data-role="subheadline">{{ slots.status }}</p>
    </div>
  </div>
</body>
</html>
