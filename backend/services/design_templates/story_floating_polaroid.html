<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{position:relative}.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.shell{position:relative;height:100%;display:flex;align-items:center;justify-content:center}.card{background:#fff;padding:1.2cqw 1.2cqw 3.5cqw;border-radius:.8cqw;transform:rotate(-5deg);box-shadow:-1.2cqw 2cqw 3cqw rgba(0,0,0,.45);width:60%}.card img{width:100%;height:16cqw;object-fit:cover;border-radius:.4cqw}.card p{margin:1.2cqw 0 0;color:#000;text-align:center;font-family:Georgia,serif;font-size:1.6cqw}
</style></head><body><div class="container-base format-ig-story"><img class="bg" src="{{ hero_image_url }}" alt="{{ slots.headline }}" /><div id="arcco-design-content" class="shell"><div class="card"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /><p>{{ slots.headline }}</p></div></div></div></body></html>
