<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #1e293b; color: #fff; padding: 2.4cqw; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .chart { width: 18cqw; height: 18cqw; border-radius: 999px; background: conic-gradient(#3b82f6 0% 60%, #10b981 60% 85%, #f59e0b 85% 100%); margin-bottom: 2.4cqw; box-shadow: 0 1cqw 3cqw rgba(0,0,0,.4); }
    .legend { width: 100%; display: flex; flex-direction: column; gap: .9cqw; }
    .row { display: flex; align-items: center; gap: .8cqw; font-size: 1cqw; }
    .sw { width: .95cqw; height: .95cqw; border-radius: .2cqw; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div class="chart"></div>
    <div id="arcco-design-content" class="legend">
      <div class="row"><span class="sw" style="background:#3b82f6"></span>{{ slots.phase_1 }} ({{ slots.value_1 }})</div>
      <div class="row"><span class="sw" style="background:#10b981"></span>{{ slots.phase_2 }} ({{ slots.value_2 }})</div>
      <div class="row"><span class="sw" style="background:#f59e0b"></span>{{ slots.phase_3 }} ({{ slots.value_3 }})</div>
    </div>
  </div>
</body>
</html>
