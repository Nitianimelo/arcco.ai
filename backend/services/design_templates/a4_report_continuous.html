<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #d8dde5; }
    .container-base { background: #fff; color: #0f172a; }
    .a4-shell { display: flex; flex-direction: column; gap: 1.2cqw; padding: 8cqw 7cqw; height: 100%; }
    .a4-title { font-family: Georgia, serif; font-size: clamp(34px, 3.8cqw, 54px); line-height: 1.08; margin: 0; }
    .a4-subtitle { font-size: clamp(15px, 1.2cqw, 22px); line-height: 1.6; color: #334155; margin: 0; }
    .a4-divider { width: 100%; height: 1px; background: rgba(15,23,42,.14); margin: .6cqw 0 1cqw; }
    .a4-body { display: grid; grid-template-columns: 1fr; gap: 1.2cqw; font-size: clamp(14px, 1.08cqw, 20px); line-height: 1.72; color: #1e293b; }
    .a4-signature { margin-top: auto; font-size: clamp(13px, .95cqw, 18px); color: #475569; text-transform: uppercase; letter-spacing: .14em; }
  </style>
</head>
<body>
  <div class="container-base format-a4">
    <div id="arcco-design-content" class="a4-shell">
      <h1 class="a4-title" data-role="headline">{{ slots.title }}</h1>
      <p class="a4-subtitle" data-role="subheadline">{{ slots.subtitle }}</p>
      <div class="a4-divider"></div>
      <div class="a4-body">
        <p>{{ slots.intro }}</p>
        <p>{{ slots.section_1 }}</p>
        <p>{{ slots.section_2 }}</p>
        <p>{{ slots.section_3 }}</p>
        <p>{{ slots.closing }}</p>
      </div>
      <div class="a4-signature">{{ slots.signature }}</div>
    </div>
  </div>
</body>
</html>
