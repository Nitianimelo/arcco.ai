<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #e5e5e5; display: flex; align-items: center; justify-content: center; padding: 2.4cqw; }
    .label { width: 100%; background: #fff; border: .25cqw solid #000; padding: 1.8cqw; display: flex; flex-direction: column; }
    .barcode { width: 100%; height: 6cqw; margin: 1.2cqw 0; background: repeating-linear-gradient(90deg, #000, #000 .3cqw, #fff .3cqw, #fff .5cqw, #000 .5cqw, #000 .9cqw, #fff .9cqw, #fff 1.2cqw); }
    .title { margin: 0; font-family: "Space Grotesk", sans-serif; font-size: 3cqw; text-transform: uppercase; line-height: .95; }
    .code { margin: 0; font-family: monospace; font-size: .95cqw; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div id="arcco-design-content" class="label">
      <span class="cq-kicker">{{ slots.label }}</span>
      <h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1>
      <div class="barcode"></div>
      <p class="code">{{ slots.product_code }}</p>
    </div>
  </div>
</body>
</html>
