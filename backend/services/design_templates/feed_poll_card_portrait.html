<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #111; }
    .container-base { background: #fafaf9; color: #111; }
    .shell { height: 100%; padding: 3cqw 2.2cqw; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .title { margin: 0 0 2cqw; font-size: 2.2cqw; max-width: 13ch; }
    .poll { width: 100%; background: #fff; border-radius: 1.2cqw; overflow: hidden; box-shadow: 0 1cqw 2cqw rgba(0,0,0,.06); }
    .opt { padding: 1.7cqw; font-weight: 800; font-size: 1.45cqw; color: #3b82f6; border-bottom: 1px solid #f0f0f0; }
    .opt:last-child { border-bottom: 0; color: #111; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div id="arcco-design-content" class="shell">
      <h1 class="cq-title title" data-role="headline">{{ slots.poll_question }}</h1>
      <div class="poll">
        <div class="opt">{{ slots.option_a }}</div>
        <div class="opt">{{ slots.option_b }}</div>
      </div>
    </div>
  </div>
</body>
</html>
