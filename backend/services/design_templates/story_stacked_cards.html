<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{background:#f8fafc;display:flex;align-items:center;justify-content:center;position:relative}.layer{position:absolute;width:76%;height:46%;border-radius:1.6cqw}.l1{background:#dbeafe;transform:rotate(-6deg) translate(-1.5cqw,-1.2cqw)}.l2{background:#bfdbfe;transform:rotate(3deg)}.l3{background:#fff;box-shadow:0 1.2cqw 2.5cqw rgba(0,0,0,.08);padding:2.2cqw;box-sizing:border-box}.tag{display:inline-block;padding:.45em .8em;border-radius:999px;background:#0f172a;color:#fff;font-size:.85cqw}.title{margin:.7em 0 .35em;font-size:2.1cqw}.body{color:#64748b}
</style></head><body><div class="container-base format-ig-story"><div class="layer l1"></div><div class="layer l2"></div><div id="arcco-design-content" class="layer l3"><span class="tag">{{ slots.eyebrow }}</span><h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1><p class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</p></div></div></body></html>
