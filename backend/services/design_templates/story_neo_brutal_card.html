<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>{{ title }}</title>
<style>
body{margin:0;background:#111}.container-base{background:#ffe5e5;border:.4cqw solid #000;display:flex;align-items:center;justify-content:center}.card{background:#a7f3d0;border:.4cqw solid #000;padding:2.2cqw;width:80%;box-shadow:.8cqw .8cqw 0 #000;transform:rotate(-3deg)}.title{margin:0;font-size:3.2cqw;text-transform:uppercase;line-height:1}.tag{display:inline-block;margin-top:1.2cqw;padding:.45em .8em;background:#000;color:#fff;font-weight:700}.body{margin-top:1.2cqw;font-weight:600}
</style></head><body><div class="container-base format-ig-story"><div id="arcco-design-content" class="card"><h1 class="cq-title title" data-role="headline">{{ slots.headline }}</h1><div class="tag">{{ slots.eyebrow }}</div><p class="cq-body body" data-role="subheadline">{{ slots.subheadline }}</p></div></div></body></html>
