<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; background: #0b0b0d; }
    .container-base { background: #f7f5f1; }
    .content-shell { align-items: stretch; }
    .portrait-copy { justify-content: flex-end; }
    .portrait-frame { width: 100%; height: 100%; overflow: hidden; border-radius: 30px; background: #ebe7e1; }
    .portrait-frame img { width: 100%; height: 100%; object-fit: cover; display: block; filter: saturate(.92); }
    .portrait-kicker { color: #7a6d60; text-transform: uppercase; letter-spacing: .2em; }
    .portrait-title { font-family: Georgia, serif; color: #2e2823; }
    .portrait-body { color: #544a40; }
    .portrait-cta { display: inline-flex; border-bottom: 2px solid #2e2823; padding-bottom: .3em; color: #2e2823; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container-base format-ig-post-portrait">
    <div id="arcco-design-content" class="content-shell">
      <div class="content-media">
        <div class="portrait-frame"><img src="{{ hero_image_url }}" alt="{{ slots.headline }}" /></div>
      </div>
      <div class="content-copy portrait-copy">
        <span class="cq-kicker portrait-kicker">{{ slots.eyebrow }}</span>
        <h1 class="cq-title portrait-title" data-role="headline">{{ slots.headline }}</h1>
        <p class="cq-body portrait-body" data-role="subheadline">{{ slots.subheadline }}</p>
        <div class="content-actions"><span class="portrait-cta">{{ slots.cta }}</span></div>
      </div>
    </div>
  </div>
</body>
</html>
